<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Gabriel Maurina</title>

</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">

                <div class="card shadow">
                    <div class="card-header text-center">
                        <h3>Calculadora</h3>
                    </div>

                    <div class="card-body">
                        <input type="number" id="num1" class="form-control mb-3" placeholder="Primeiro número">

                        <input type="number" id="num2" class="form-control mb-3" placeholder="Segundo número">

                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" onclick="somar()">Somar</button>
                            <button class="btn btn-success" onclick="subtrair()">Subtrair</button>
                            <button class="btn btn-warning" onclick="multiplicar()">Multiplicar</button>
                            <button class="btn btn-danger" onclick="dividir()">Dividir</button>
                        </div>

                        <div class="alert alert-info mt-3 text-center">
                            Resultado: <span id="resultado">0</span>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="script.js"></script>

</body>
</html>
